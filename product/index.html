<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>セラピスト向け顧客管理アプリ</title>
    <link rel="stylesheet" href="css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>セラピスト向け顧客管理</h1>
        <div style="display: inline-flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.2); padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border-glass); backdrop-filter: blur(10px);">
            <span style="font-size: 0.75rem; color: var(--text-secondary);">🌙</span>
            <input type="range" id="theme-slider" min="0" max="100" value="0" style="width: 60px; height: 4px; accent-color: var(--accent-cyan); cursor: pointer;" title="テーマ調整">
            <span style="font-size: 0.75rem; color: var(--text-secondary);">☀️</span>
        </div>
    </header>

    <main>
        <!-- ビュー切り替えスイッチ -->
        <div class="view-switcher" style="display: flex; gap: 8px; margin-bottom: 8px; background: rgba(0,0,0,0.15); padding: 4px; border-radius: 12px; border: 1px solid var(--border-glass);">
            <button id="btn-view-list" style="flex: 1; padding: 10px; border-radius: 8px; border: none; background: var(--accent-cyan); color: #000; font-weight: 600; cursor: pointer; transition: var(--transition-smooth);">👥 顧客一覧</button>
            <button id="btn-view-calendar" style="flex: 1; padding: 10px; border-radius: 8px; border: none; background: transparent; color: var(--text-secondary); font-weight: 500; cursor: pointer; transition: var(--transition-smooth);">📅 カレンダー</button>
        </div>

        <div class="workspace-grid">
            <!-- 左カラム: 一覧 or カレンダー -->
            <div class="workspace-column-left">
                <!-- 検索・追加エリア -->
                <section class="search-container" id="search-container-section">
                    <input type="text" id="search-input" class="search-input" placeholder="名前・かなで検索...">
                    <button id="btn-add-customer" class="btn-primary">
                        <span style="font-size: 1.2rem;">＋</span> 顧客登録
                    </button>
                </section>

                <!-- 顧客一覧リスト -->
                <section class="customer-list" id="customer-list-container">
                    <!-- 動的に顧客カードが追加されます -->
                </section>

                <!-- カレンダービューエリア (初期値は非表示) -->
                <section id="calendar-view-container" style="display: none;" class="calendar-view-section">
                    <div class="calendar-header">
                        <button id="calendar-prev-btn" class="calendar-nav-btn">&larr;</button>
                        <div id="calendar-month-title" class="calendar-title">2026年 7月</div>
                        <button id="calendar-next-btn" class="calendar-nav-btn">&rarr;</button>
                    </div>
                    <div class="calendar-grid">
                        <div class="calendar-weekday">日</div>
                        <div class="calendar-weekday">月</div>
                        <div class="calendar-weekday">火</div>
                        <div class="calendar-weekday">水</div>
                        <div class="calendar-weekday">木</div>
                        <div class="calendar-weekday">金</div>
                        <div class="calendar-weekday">土</div>
                    </div>
                    <div class="calendar-grid" id="calendar-grid-body">
                        <!-- JSで動的にカレンダーセルを描画します -->
                    </div>
                    <div id="calendar-day-details" class="calendar-visits-list" style="display: none;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid var(--border-glass); padding-bottom: 8px;">
                            <h3 id="calendar-details-title" style="font-size: 1.05rem; font-weight: 700; margin: 0;">7月20日の記録</h3>
                            <button id="btn-calendar-add-record" class="btn-primary" style="display: none; padding: 6px 12px; font-size: 0.8rem;">＋ 記録追加</button>
                        </div>

                        <!-- [MINOR v1.6.0] カレンダー直結型クイックインライン記録フォーム -->
                        <div id="calendar-inline-form-container" style="background: rgba(255,255,255,0.02); border: 1px solid var(--border-glass); border-radius: 16px; padding: 14px; margin-bottom: 16px;">
                            <h4 style="font-size: 0.85rem; font-weight: 600; margin-bottom: 10px; color: var(--accent-cyan); display: flex; align-items: center; gap: 4px;">✍️ この日の施術記録を追加</h4>
                            <div style="display: flex; flex-direction: column; gap: 8px;">
                                <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                                    <div style="flex: 1; min-width: 140px;">
                                        <span style="font-size: 0.75rem; color: var(--text-secondary);">対象顧客</span>
                                        <select id="inline-record-customer-id" class="form-control" style="width: 100%; padding: 8px; font-size: 0.85rem; margin-top: 2px;"></select>
                                    </div>
                                    <div style="flex: 1.5; min-width: 160px;">
                                        <span style="font-size: 0.75rem; color: var(--text-secondary);">施術メニュー</span>
                                        <input type="text" id="inline-record-type" class="form-control" placeholder="例: アロマ 60分" style="width: 100%; padding: 8px; font-size: 0.85rem; margin-top: 2px;">
                                    </div>
                                    <div style="width: 110px;">
                                        <span style="font-size: 0.75rem; color: var(--text-secondary);">金額 (円)</span>
                                        <input type="number" id="inline-record-amount" class="form-control" placeholder="例: 8000" style="width: 100%; padding: 8px; font-size: 0.85rem; margin-top: 2px;">
                                    </div>
                                </div>

                                <!-- 詳細項目（アコーディオン） -->
                                <details style="margin-top: 4px;">
                                    <summary style="font-size: 0.8rem; color: var(--text-secondary); cursor: pointer; user-select: none; padding: 4px 0;">📝 詳細メモを入力する（時間・訴え・処方等）</summary>
                                    <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 6px; padding-top: 8px; border-top: 1px dashed var(--border-glass);">
                                        <div style="display: flex; gap: 8px;">
                                            <div style="flex: 1;">
                                                <span style="font-size: 0.75rem; color: var(--text-secondary);">時間帯</span>
                                                <input type="text" id="inline-record-time" class="form-control" placeholder="例: 14:00 - 15:00" style="width: 100%; padding: 8px; font-size: 0.85rem; margin-top: 2px;">
                                            </div>
                                        </div>
                                        <div>
                                            <span style="font-size: 0.75rem; color: var(--text-secondary);">顧客からの訴え</span>
                                            <textarea id="inline-record-complaint" class="form-control" placeholder="例: 肩こり、首の重だるさ" style="width: 100%; padding: 8px; font-size: 0.85rem; height: 50px; min-height: 50px; margin-top: 2px; resize: vertical;"></textarea>
                                        </div>
                                        <div>
                                            <span style="font-size: 0.75rem; color: var(--text-secondary);">本日の処方</span>
                                            <textarea id="inline-record-prescription" class="form-control" placeholder="例: 首と肩のリンパを流すアプローチ" style="width: 100%; padding: 8px; font-size: 0.85rem; height: 50px; min-height: 50px; margin-top: 2px; resize: vertical;"></textarea>
                                        </div>
                                        <div>
                                            <span style="font-size: 0.75rem; color: var(--text-secondary);">施術後のメモ</span>
                                            <textarea id="inline-record-note" class="form-control" placeholder="例: 首の付け根が非常に硬かった" style="width: 100%; padding: 8px; font-size: 0.85rem; height: 50px; min-height: 50px; margin-top: 2px; resize: vertical;"></textarea>
                                        </div>
                                    </div>
                                </details>

                                <button type="button" id="btn-inline-submit-record" class="btn-primary" style="padding: 10px; font-size: 0.9rem; margin-top: 6px; width: 100%;">この記録を保存する</button>
                            </div>
                        </div>

                        <div id="calendar-visits-container">
                            <!-- 動的にその日の来店記録がリスト表示されます -->
                        </div>
                    </div>
                </section>
            </div>

            <!-- 右カラム: 顧客詳細 -->
            <div class="workspace-column-right">
                <!-- 顧客詳細ビュー (未選択時は非表示) -->
                <section class="detail-view" id="customer-detail-view" style="display: none;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border-glass); padding-bottom: 12px;">
                        <div>
                            <h2 id="detail-name" style="font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; margin-top: 0;">山田 花子</h2>
                            <p id="detail-kana" style="font-size: 0.85rem; color: var(--text-secondary); margin: 0;">ヤマダ ハナコ</p>
                        </div>
                        <button id="btn-close-detail" style="background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 1.5rem; line-height: 1;">×</button>
                    </div>

                    <!-- タブ切り替えボタン -->
                    <div class="tab-container">
                        <button class="tab-btn active" data-tab="visit-count">来店回数</button>
                        <button class="tab-btn" data-tab="visit-type">施術内容</button>
                        <button class="tab-btn" data-tab="visit-amount">金額</button>
                        <button class="tab-btn" data-tab="personal-info">個人情報</button>
                    </div>

                    <!-- タブコンテンツ領域 -->
                    <div class="tab-content" id="tab-content-area">
                        <!-- 動的にコンテンツが挿入されます -->
                    </div>

                    <!-- 新規記録を追加するボタン (カレンダー直結化により非表示) -->
                    <div id="add-record-action" style="margin-top: 8px; display: none;">
                        <button id="btn-add-record" class="btn-primary" style="width: 100%;">
                            <span>＋</span> この日の記録を追加
                        </button>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- 顧客登録モーダル -->
    <div class="modal-overlay" id="customer-modal">
        <div class="modal-content">
            <h3 id="customer-modal-title" style="font-size: 1.2rem; font-weight: 700; border-bottom: 1px solid var(--border-glass); padding-bottom: 8px;">新規顧客の登録</h3>
            <form id="customer-form" style="display: flex; flex-direction: column; gap: 12px; max-height: 65vh; overflow-y: auto; padding-right: 4px; margin-bottom: 8px;">
                <div class="form-group">
                    <label for="input-customer-no">顧客No.</label>
                    <input type="text" id="input-customer-no" class="form-control" placeholder="例: C-0001 (空欄時は自動発番)">
                </div>
                <div class="form-group">
                    <label for="input-name">お名前 (必須)</label>
                    <input type="text" id="input-name" class="form-control" placeholder="例: 山田 花子" required>
                </div>
                <div class="form-group">
                    <label for="input-kana">よみがな</label>
                    <input type="text" id="input-kana" class="form-control" placeholder="例: ヤマダ ハナコ">
                </div>
                <div class="form-group">
                    <label for="input-phone">電話番号</label>
                    <input type="tel" id="input-phone" class="form-control" placeholder="例: 090-1234-5678">
                </div>
                <div class="form-group">
                    <label for="input-birthday">誕生日</label>
                    <input type="date" id="input-birthday" class="form-control">
                </div>
                <div class="form-group">
                    <label>Soul Color (13色から最大5色・タップで選択／解除)</label>
                    <div class="soul-color-selected-preview" id="input-soul-color-preview"></div>
                    <div class="soul-color-selector" id="input-soul-color-container">
                        <span class="color-chip red" data-color="red" title="レッド"></span>
                        <span class="color-chip coral" data-color="coral" title="コーラル"></span>
                        <span class="color-chip orange" data-color="orange" title="オレンジ"></span>
                        <span class="color-chip gold" data-color="gold" title="ゴールド"></span>
                        <span class="color-chip yellow" data-color="yellow" title="イエロー"></span>
                        <span class="color-chip olive" data-color="olive" title="オリーブ"></span>
                        <span class="color-chip green" data-color="green" title="グリーン"></span>
                        <span class="color-chip turquoise" data-color="turquoise" title="ターコイズ"></span>
                        <span class="color-chip blue" data-color="blue" title="ブルー"></span>
                        <span class="color-chip royal-blue" data-color="royal-blue" title="ロイヤルブルー"></span>
                        <span class="color-chip violet" data-color="violet" title="バイオレット"></span>
                        <span class="color-chip magenta" data-color="magenta" title="マゼンタ"></span>
                        <span class="color-chip clear" data-color="clear" title="クリア"></span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="input-referrer">紹介者</label>
                    <input type="text" id="input-referrer" class="form-control" placeholder="例: 佐藤 健太">
                </div>
                <div class="form-group">
                    <label for="input-initial-consultation">初診問診 (体重や病歴など)</label>
                    <textarea id="input-initial-consultation" class="form-control" placeholder="例: 体重 52kg。病歴なし。アトピー肌のためオイル注意。"></textarea>
                </div>
                <div class="form-group">
                    <label for="input-memo">特記事項・メモ</label>
                    <textarea id="input-memo" class="form-control" placeholder="身体の特徴、お茶の好み等"></textarea>
                </div>
            </form>
            <div style="display: flex; gap: 8px;">
                <button type="button" id="btn-cancel-customer" class="btn-primary" style="background: rgba(255,255,255,0.05); color: var(--text-primary); flex: 1;">キャンセル</button>
                <button type="button" id="btn-submit-customer" class="btn-primary" style="flex: 1;">登録する</button>
            </div>
        </div>
    </div>

    <!-- レコード（施術・金額・来店日）追加モーダル -->
    <div class="modal-overlay" id="record-modal">
        <div class="modal-content">
            <h3 id="record-modal-title" style="font-size: 1.2rem; font-weight: 700; border-bottom: 1px solid var(--border-glass); padding-bottom: 8px;">施術内容・金額の記録</h3>
            <form id="record-form" style="display: flex; flex-direction: column; gap: 12px; max-height: 65vh; overflow-y: auto; padding-right: 4px; margin-bottom: 8px;">
                <div class="form-group" id="record-customer-select-group" style="display: none;">
                    <label for="input-record-customer-id">対象顧客</label>
                    <select id="input-record-customer-id" class="form-control">
                        <!-- 動的に選択肢が挿入されます -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="input-date">来店日</label>
                    <input type="date" id="input-date" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="input-time">時間</label>
                    <input type="text" id="input-time" class="form-control" placeholder="例: 14:00 - 15:30">
                </div>
                <div class="form-group">
                    <label for="input-type">施術メニュー・内容</label>
                    <input type="text" id="input-type" class="form-control" placeholder="例: 全身もみほぐし 60分" required>
                </div>
                <div class="form-group">
                    <label for="input-client-complaint">クライアント側の訴え</label>
                    <textarea id="input-client-complaint" class="form-control" placeholder="例: 肩こり、首まわりの重だるさ"></textarea>
                </div>
                <div class="form-group">
                    <label for="input-prescription">処方</label>
                    <textarea id="input-prescription" class="form-control" placeholder="例: ブルーを用いたリラックスアプローチ、肩甲骨はがし"></textarea>
                </div>
                <div class="form-group">
                    <label for="input-therapist-note">メモ (therapist側のメモ、気付き)</label>
                    <textarea id="input-therapist-note" class="form-control" placeholder="例: 右肩下がりの緊張が強い。施術後はスッキリしたとのこと。"></textarea>
                </div>
                <div class="form-group">
                    <label for="input-amount">金額 (円)</label>
                    <input type="number" id="input-amount" class="form-control" placeholder="例: 6000" required>
                </div>
            </form>
            <div style="display: flex; gap: 8px;">
                <button type="button" id="btn-cancel-record" class="btn-primary" style="background: rgba(255,255,255,0.05); color: var(--text-primary); flex: 1;">キャンセル</button>
                <button type="button" id="btn-submit-record" class="btn-primary" style="flex: 1;">記録する</button>
            </div>
        </div>
    </div>

    <!-- UI制御ロジックのロード -->
    <script type="module" src="js/app/ui.js"></script>

    <!-- Aurora Dialogue Chat Integration (For context linking) -->
    <script type="module">
        import { initAuroraChat } from './js/vendor/floating-chat/integrations/entry-aurora.js';
        initAuroraChat();
    </script>
</body>
</html>
